      .value { fill: #041f1a; font: 900 34px Arial, sans-serif; text-anchor: middle; }
      .bar-bg { fill: rgba(255,255,255,0.09); }
      .bar { fill: url(#bar); }
      .footer { fill: #cbd4d0; font: 700 22px Arial, sans-serif; }
      .mark { fill: none; stroke: #cbd4d0; stroke-width: 2; opacity: 0.45; }
