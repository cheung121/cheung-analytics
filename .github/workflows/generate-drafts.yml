name: Generate Cheung Analytics Drafts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14,23,3 * * *"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate draft
        run: python scripts/generate_draft.py --season 2026

      - name: Upload generated draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheung-analytics-generated-draft
          path: |
            outputs/drafts/
            site/generated/

